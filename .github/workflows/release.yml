name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for npm trusted publishing (provenance included)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC support needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
      - run: npm publish
